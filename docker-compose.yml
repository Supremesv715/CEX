version: '3.8'

services:
  db:
    image: postgres:15
    container_name: engine-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: engine_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d engine_dev"]
      interval: 2s
      retries: 20

volumes:
  db_data:
